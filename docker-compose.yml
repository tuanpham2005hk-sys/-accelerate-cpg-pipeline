# Phần 1 — Việc 3: Kafka + Zookeeper cho môi trường lab (single broker)
# Dựng:   docker compose up -d
# Tắt:    docker compose down   (thêm -v để xoá luôn volume/data)
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: cpg-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/2181"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: cpg-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      # listener nội bộ (giữa các container) : kafka:29092
      # listener cho host (script chạy ngoài): localhost:9092
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Lab: 1 broker => mọi thứ replication = 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 15
  
  spark:
    image: apache/spark:3.5.1-python3
    container_name: cpg-spark
    user: root
    entrypoint: ["tail", "-f", "/dev/null"]
    environment:
      # Bắt buộc khai báo thủ công vì đã override entrypoint gốc của image
      # apache/spark (script gốc mới là nơi tự thêm /opt/spark/bin vào PATH).
      PATH: "/opt/spark/bin:/opt/spark/sbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      SPARK_HOME: "/opt/spark"
    volumes:
      - ./scripts:/opt/spark-jobs/scripts
      - ./output:/opt/spark-jobs/output
      - spark_ivy_cache:/root/.ivy2
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  mongodb:
    image: mongo:8.0
    container_name: cpg-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.15.0
    container_name: cpg-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc", "streams"]
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 5

volumes:
  mongodb_data:
  neo4j_data:
  spark_ivy_cache:
